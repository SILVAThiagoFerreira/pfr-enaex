<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PFR | Enaex</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" defer></script>
    <script src="app.js" defer></script>
  </head>
  <body>
    <header class="topbar">
      <img src="assets/logo-enaex.png" alt="Enaex">
      <div>
        <h1>Plano de Fogo Realizado</h1>
        <p>Upload, validacao, processamento e download em uma unica pagina.</p>
      </div>
    </header>

    <main class="layout">
      <section class="panel">
        <form id="pfr-form" class="upload-form">
          <div class="file-grid">
            <label class="file-field" for="project-file">
              <span class="field-title">Projeto completo</span>
              <span class="field-text">CSV, XLSX ou XLSM</span>
              <input id="project-file" name="project-file" type="file" required accept=".csv,.xlsx,.xlsm">
            </label>
            <label class="file-field" for="final-file">
              <span class="field-title">Config final</span>
              <span class="field-text">CSV, XLSX ou XLSM</span>
              <input id="final-file" name="final-file" type="file" required accept=".csv,.xlsx,.xlsm">
            </label>
            <label class="file-field" for="pp-file">
              <span class="field-title">Plano PP</span>
              <span class="field-text">PDF do plano</span>
              <input id="pp-file" name="pp-file" type="file" required accept=".pdf">
            </label>
            <label class="file-field" for="histo-file">
              <span class="field-title">Historial DRB</span>
              <span class="field-text">TXT do HISTO</span>
              <input id="histo-file" name="histo-file" type="file" required accept=".txt">
            </label>
          </div>
          <button id="generate" type="submit">Gerar plano</button>
        </form>

        <div id="status" class="message hidden"></div>
      </section>

      <aside class="panel side">
        <h2>Arquivos esperados</h2>
        <ul>
          <li>Projeto completo: CSV, XLSX ou XLSM</li>
          <li>Config final: CSV, XLSX ou XLSM</li>
          <li>HISTO: TXT</li>
          <li>PP: PDF opcional para rastreabilidade</li>
        </ul>
        <h2>Execucao</h2>
        <ul id="file-list">
          <li>Nenhum arquivo anexado</li>
        </ul>
      </aside>
    </main>
  </body>
</html>
